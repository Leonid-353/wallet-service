databaseChangeLog:
  - changeSet:
      id: 001-create-wallets-table
      author: leonid353
      comment: Создание таблицы кошельков
      changes:
        - createTable:
            tableName: wallets
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: decimal(19, 2)
                  defaultValue: "0.00"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-add-balance-check-constraint
      author: leonid353
      comment: Баланс не может быть отрицательным
      changes:
        - sql:
            sql: ALTER TABLE wallets ADD CONSTRAINT chk_balance_non_negative CHECK (balance >= 0)

  - changeSet:
      id: 001-create-transactions-table
      author: leonid353
      comment: Таблица истории транзакций
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: wallet_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transactions_wallets
                    references: wallets(id)
              - column:
                  name: amount
                  type: decimal(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: timestamp with time zone
              - column:
                  name: error_message
                  type: varchar(500)
              - column:
                  name: retry_count
                  type: int
                  defaultValue: "0"
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-add-transactions-indexes
      author: leonid353
      comment: Индексы для быстрого поиска транзакций
      changes:
        - createIndex:
            indexName: idx_transactions_wallets_id
            tableName: transactions
            columns:
              - column:
                  name: wallet_id
        - createIndex:
            indexName: idx_transactions_status
            tableName: transactions
            columns:
              - column:
                  name: status