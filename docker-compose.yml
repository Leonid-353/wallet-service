version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-walletdb}
      POSTGRES_USER: ${POSTGRES_USER:-username}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-username} -d ${POSTGRES_DB:-walletdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wallet-network

  wallet-service:
    build: .
    container_name: wallet-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-walletdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-username}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      SERVER_PORT: 8080
    networks:
      - wallet-network

volumes:
  postgres-data:

networks:
  wallet-network:
    driver: bridge